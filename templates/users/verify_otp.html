{% extends 'base.html' %}

{% block content %}
<div class="reset-section" style="background-color: #f4f5f7; display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="reset-card" style="background-color: #ffffff; width: 100%; max-width: 420px; padding: 40px; border-radius: 12px;">
        <h2 style="text-align: center;">XÁC THỰC OTP</h2>
        <p style="text-align: center; color: #777;">Mã đã được gửi về Email của bạn</p>

        <form method="POST">
            {% csrf_token %}
            <div class="input-group" style="margin-bottom: 20px;">
                <label>Nhập mã 6 số</label>
                <input type="text" name="otp" placeholder="xxxxxx" maxlength="6" style="width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 8px;" required>
            </div>
            <button type="submit" style="width: 100%; padding: 16px; background-color: #ffc107; border: none; border-radius: 50px; font-weight: 800;">XÁC NHẬN</button>
        </form>
    </div>
</div>
{% endblock %}
