{% extends 'base.html' %}

{% block content %}
<style>
    .reset-section { background-color: #f4f5f7; display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 40px 0; }
    .reset-card { background-color: #ffffff; width: 100%; max-width: 420px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); }
    .btn-reset { width: 100%; padding: 16px; background-color: #ffc107; color: #1a1a1a; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; }
    .input-group { margin-bottom: 20px; }
    .input-group input { width: 100%; padding: 14px 15px; border: 1.5px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; }
</style>

<div class="reset-section">
    <div class="reset-card">
        <h2 style="text-align: center;">QUÊN MẬT KHẨU</h2>
        <p style="text-align: center; color: #777;">Nhập email đã đăng ký để nhận mã OTP</p>

        {% if messages %}
            {% for message in messages %}
                <div style="padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center; background-color: #ffcccc; color: #cc0000;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>Email của bạn</label>
                <input type="email" name="email" placeholder="ví dụ: abc@gmail.com" required>
            </div>
            <button type="submit" class="btn-reset">GỬI MÃ XÁC THỰC</button>
        </form>
    </div>
</div>
{% endblock %}
