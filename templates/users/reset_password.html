{% extends 'base.html' %}

{% block content %}
<div class="reset-section" style="background-color: #f4f5f7; display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="reset-card" style="background-color: #ffffff; width: 100%; max-width: 420px; padding: 40px; border-radius: 12px;">
        <h2 style="text-align: center;">ĐẶT LẠI MẬT KHẨU</h2>

        <form method="POST">
            {% csrf_token %}
            <div class="input-group" style="margin-bottom: 15px;">
                <label>Mật khẩu mới</label>
                <input type="password" name="password" style="width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 8px;" required>
            </div>
            <div class="input-group" style="margin-bottom: 25px;">
                <label>Xác nhận mật khẩu</label>
                <input type="password" name="confirm_password" style="width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 8px;" required>
            </div>
            <button type="submit" style="width: 100%; padding: 16px; background-color: #1a1a1a; color: white; border: none; border-radius: 50px; font-weight: 800;">CẬP NHẬT MẬT KHẨU</button>
        </form>
    </div>
</div>
{% endblock %}
