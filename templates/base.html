<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shoe Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">👟 SHOE STORE</a>
        
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" href="/products/">Sản phẩm</a></li>
                <li class="nav-item"><a class="nav-link" href="/help/">Trợ giúp</a></li>
            </ul>

            <form class="d-flex mx-auto" action="/products/search/" method="GET">
                <input class="form-control me-2" type="search" name="q" placeholder="Tìm giày...">
                <button class="btn btn-outline-light" type="submit"><i class="fas fa-search"></i></button>
            </form>

            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/cart/"><i class="fas fa-shopping-cart"></i> Giỏ hàng</a></li>
                <li class="nav-item"><a class="nav-link" href="/users/login/">Đăng nhập</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %} {% endblock %}
</div>

<footer class="text-center py-4 border-top mt-5">
    <p>© 2026 Shoe Store - Dự án Django</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
